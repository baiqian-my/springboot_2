spring:
  application:
    name:
      springboot-week10_2
server:
  port: 9090

Logging:
  pattern:
    console: "%d{HH:mm: ss.SSS} [%thread] %highlight(%-5level) %cyan(%logger{36}) - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/application.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
  level:
    root: INFO
    com.mini.week09: DEBUG